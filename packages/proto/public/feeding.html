<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/page.css" />
  </head>
  <body>
    <header>
      <div class="title-group">
        <h1>
          <a href="index.html">
            <svg class="icon"><use href="/icons/user.svg#horse-user"/></svg>
            PaddockPro
          </a>
        </h1>
        
        <h2>
          <a href="horse.html">Addie</a>'s Feeding Schedule
        </h2>
      </div>
      <nav>
        <a href="horses.html">All Horses</a>
        <a href="owners.html">All Owners</a>
      </nav>
      <label
      onchange="relayEvent(event, 'dark-mode:toggle', {
      checked: event.target.checked
      })"
      >
      <input type="checkbox" />
      Dark mode
    </label>
    </header>

    <section class>
      <br>
      <table>
        <tr>
          <th></th>
          <th>Breakfast</th>
          <th>Lunch</th>
          <th>Dinner</th>
        </tr>
        <tr>
          <td><strong>Hay</strong></td>
          <td>Grass Hay</td>
          <td>N/A</td>
          <td>Alfalfa</td>
        </tr>
        <tr>
          <td><strong>Grain</strong></td>
          <td>N/A</td>
          <td>N/A</td>
          <td>One scoop senior grain</td>
        </tr>
        <tr>
          <td><strong>Supplements</strong></td>
          <td>N/A</td>
          <td>N/A</td>
          <td>One scoop MSM</td>
        </tr>
      </table>
    </section>
    <script>
    function relayEvent(event, type, detail = {}) {
      event.stopPropagation();

      const customEvent = new CustomEvent(
        type, {
          bubbles: true,
          detail,
        });
        
        event.target.dispatchEvent(customEvent);
      }
    
    const page = document.body;
    
    page.addEventListener(
      "dark-mode:toggle",
      (event) => {
        const checked = event.detail.checked;
        page.classList.toggle("dark-mode", checked);
      }
    );
    </script>
  </body>
</html>
